spring.application.name=fridge-helper

notion.api-key=${NOTION_API_KEY:}
notion.database-id=${NOTION_DATABASE_ID:}
notion.base-url=${NOTION_BASE_URL:https://api.notion.com}
notion.version=${NOTION_VERSION:2026-03-11}
notion.ingredient-name-property=${NOTION_INGREDIENT_NAME_PROPERTY:}
notion.expiration-date-property=${NOTION_EXPIRATION_DATE_PROPERTY:\u4F7F\u7528\u671F\u9650}
notion.stock-status-property=${NOTION_STOCK_STATUS_PROPERTY:\u5728\u5EAB\u30B9\u30C6\u30FC\u30BF\u30B9}
notion.in-stock-value=${NOTION_IN_STOCK_VALUE:\u5728\u5EAB\u3042\u308A}

rakuten.recipe.application-id=${RAKUTEN_RECIPE_APPLICATION_ID:${RAKUTEN_API_KEY:}}
rakuten.recipe.access-key=${RAKUTEN_RECIPE_ACCESS_KEY:}
rakuten.recipe.base-url=${RAKUTEN_RECIPE_BASE_URL:https://app.rakuten.co.jp}

server.port=8081
